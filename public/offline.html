<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | Dj Smith Movies</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .icon {
            width: 120px;
            height: 120px;
            color: #dc2626; /* Red 600 */
            margin-bottom: 2rem;
            animation: pulse 2s infinite;
        }
        h1 { font-size: 2rem; font-weight: 900; margin-bottom: 0.5rem; }
        p { color: #9ca3af; max-width: 300px; line-height: 1.5; margin-bottom: 2rem; }
        button {
            background-color: #dc2626;
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 9999px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover { background-color: #b91c1c; }
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414" />
    </svg>
    <h1>You're Offline</h1>
    <p>Check your internet connection to continue streaming the latest movies and shows.</p>
    <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
