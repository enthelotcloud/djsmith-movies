<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied - Dj Smith Movies</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .container { max-width: 600px; }
        .emoji { font-size: 80px; animation: bounce 1s infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        h1 { font-size: 48px; font-weight: 900; margin: 20px 0; color: #dc2626; }
        .verse { font-style: italic; color: #9ca3af; font-size: 18px; line-height: 1.8; margin: 20px 0; padding: 15px; border-left: 3px solid #dc2626; border-right: 3px solid #dc2626; }
        .message { color: #6b7280; font-size: 16px; line-height: 1.6; margin: 20px 0; }
        .highlight { color: #f59e0b; font-weight: bold; }
        .button { display: inline-block; padding: 15px 40px; background: #dc2626; color: white; text-decoration: none; border-radius: 12px; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        .button:hover { background: #b91c1c; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🕵️</div>
        <h1>Nice Try! 😂</h1>
        <div class="verse">"Thou shalt not steal." — Exodus 20:15</div>
        <div class="message">
            <p>We see you trying to download our content! 👀</p>
            <p>Nice try, but <span class="highlight">you gotta pay to play!</span> 🎬</p>
        </div>
        <div class="verse">"Let him who stole steal no longer..." — Ephesians 4:28</div>
        <div class="message">
            <p>Why not <span class="highlight">subscribe legitimately</span> instead?</p>
        </div>
        <a href="/" class="button">🎬 Take Me Home</a>
    </div>
</body>
</html>
